name: Update papers from INSPIRE-HEP

on:
  schedule:
    - cron: "0 9 * * *" # Every day at 9am UTC
  workflow_dispatch: # Allow manual trigger

permissions:
  contents: write

jobs:
  update-papers:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Fetch papers
        run: python3 scripts/fetch_papers.py

      - name: Check for changes
        id: diff
        run: |
          git diff --exit-code _data/papers.yml _data/coauthors.yml || echo "changed=true" >> "$GITHUB_OUTPUT"

      - name: Commit and push
        if: steps.diff.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add _data/papers.yml _data/coauthors.yml
          git commit -m "Update papers and coauthors from INSPIRE-HEP"
          git push
