- title: "Gravitational Raman scattering: a systematic toolkit for tidal effects in general relativity"
  arxivnumber: "2602.06951"
  arxiv_categories: [hep-th, astro-ph.HE, gr-qc, hep-ph]
  authors:
    - "Ivanov, Mikhail M."
    - "Li, Yue-Zhou"
    - "Parra-Martinez, Julio"
    - "Zhou, Zihan"
  preprint_date: "2026-02-06"
  texkey: "Ivanov:2026icp"
  abstract: We present a framework for systematic computations of scattering amplitudes for gravitational Raman scattering, -- the inelastic scattering of massless fields off compact relativistic objects. We focus on the small-frequency (post-Minkowskian, PM) regime relevant for the study of tidal effects, which can be mapped onto gravitational wave observables during the inspiraling phase of a merger. We demonstrate that this setup is ideal for systematic studies of tidal effects, in a way that is free from coordinate, gauge, and field redefinition ambiguities. We use a combination of worldline effective field theory, the background field method, and advanced scattering amplitude techniques to derive phase shifts for scattering of spin-$0,1,2$ fields off generic compact objects at third PM order. We demonstrate that the inclusion of the recoil of the object is crucial for consistency of this calculation. Focusing on a particular case of black holes, we extract the leading static and dynamical Love numbers of the spin-0 field and the static Love number of the spin-1 field in four dimensions by matching our EFT amplitudes and calculations in General Relativity. We show, fully on-shell, that the leading static Love numbers vanish identically, while the dynamical Love numbers are not zero and run logarithmically. The latter resolves the ambiguities of previous off-shell matching calculations. We also extend our results to seven dimensions, where spin-2 Love numbers undergo a renormalization group running at 2PM, which we compute explicitly. In addition, we extract the leading static Love numbers of spin-0 and spin-1 fields in five dimensions, which also run.
  number_of_pages: 52
- title: Scattering perspective on gravitational lensing
  arxivnumber: "2511.15797"
  arxiv_categories: [hep-th, astro-ph.CO, gr-qc]
  doi: "10.1103/w2z2-974w"
  journal: "Phys.Rev.D"
  journal_volume: "113"
  journal_artid: "024024"
  publication_year: 2026
  authors:
    - "Carrillo Gonzalez, Mariana"
    - "De Luca, Valerio"
    - "Garoffolo, Alice"
    - "Parra-Martinez, Julio"
    - "Trodden, Mark"
  preprint_date: "2025-11-19"
  texkey: "CarrilloGonzalez:2025gqm"
  abstract: Gravitational waves propagating across gravitational potentials undergo lensing effects that, in the wave-optics regime, manifest as frequency-dependent amplitude and phase modulations. In this work, we revisit the diffraction integral formalism of gravitational lensing and demonstrate that it admits a natural and transparent interpretation within the framework of scattering theory. We establish a direct correspondence between the lensing amplification factor and the scattering amplitude of waves propagating in curved spacetime, clarifying how familiar lensing limits map onto distinct scattering regimes. In particular, we show that the diffraction integral matches exactly the eikonal limit of the scattering amplitude at lowest post-Minkowskian order, after a change in coordinates and the inclusion of finite-distance effects. We further extend the standard formalism by including subleading corrections to the post-Minkowskian and eikonal approximations. Our results provide a unified theoretical framework for the interpretation of lensed gravitational-wave signals and open the way to more accurate waveform modeling for future lensed observations.
  number_of_pages: 15
- title: Naturalness of vanishing black-hole tides
  arxivnumber: "2510.20694"
  arxiv_categories: [hep-th, gr-qc]
  authors:
    - "Parra-Martinez, Julio"
    - "Podo, Alessandro"
  preprint_date: "2025-10-23"
  texkey: "Parra-Martinez:2025bcu"
  abstract: We provide a symmetry argument for the vanishing and non-renormalization of static Love numbers for spherically symmetric black holes at full nonlinear order in four-dimensional General Relativity. The symmetry is realized both in full GR and in the worldline EFT, allowing for a unified treatment and proving both vanishing and non-renormalization to all orders. This closes some loop-holes in previous arguments that neglected nonlinearities in the worldline EFT, and extends previous vanishing results to all nonlinear static tides. When extended to higher-dimensional gravity, these arguments also explain the pattern of vanishing and running static Love numbers of electric and tensor type, and predict new results at the nonlinear order. We also apply our findings to the tidal response of shift-symmetric scalar fields, predicting the vanishing of even order nonlinear static Love numbers and unifying these statements with the no-hair theorem (and its violations).
  number_of_pages: 14
- title: Generalized unitarity method for worldline field theory
  arxivnumber: "2510.00989"
  arxiv_categories: [hep-th, gr-qc]
  authors:
    - "He, Vincent F."
    - "Parra-Martinez, Julio"
  preprint_date: "2025-10-01"
  texkey: "He:2025how"
  abstract: "We present a generalized unitarity method for theories of point-particle worldlines coupled to gravity, analogous to that of scattering amplitudes in quantum field theory. This method allows the computation of perturbative observables from basic principles such as locality and unitarity, thus avoiding gauge redundancies and the use of Feynman diagrams. We illustrate the method with a variety of examples, including the gravitational waveform for the scattering of two point masses at next-to-leading order (or ${\\cal O}(G^{5/2})$), reproducing known results. Our method further streamlines the calculation of the scattering dynamics of compact binary systems and opens the door to further applications and systematical exploration of structure in this class of observables."
  number_of_pages: 30
- title: "GSO defects: IIA/IIB walls and the surprisingly stable R7-brane"
  arxivnumber: "2507.21210"
  arxiv_categories: [hep-th, math-ph, math.MP]
  doi: "10.1103/wqys-zsyf"
  journal: "Phys.Rev.D"
  journal_volume: "113"
  journal_artid: "066021"
  publication_year: 2026
  authors:
    - "Heckman, Jonathan J."
    - "McNamara, Jacob"
    - "Parra-Martinez, Julio"
    - "Torres, Ethan"
  preprint_date: "2025-07-28"
  texkey: "Heckman:2025wqd"
  abstract: "The recently proposed swampland cobordism conjecture predicts the existence of new nonsupersymmetric objects which supplement the spectrum of low-energy gravitational effective field theories. In this paper, we study a subset of these defects related to the Gliozzi-Scherk-Olive projection on the string worldsheet. These include the predicted domain wall between type IIA and IIB superstring theories and the newly discovered R7-brane. We study these defects in two different ways: via long-string probes and target-space effective field theory. We find that the R7-brane can be identified with a collapsed cylindrical configuration of the IIA/IIB wall, and further, that the R7-brane is stable, in contrast to previous expectations. Moreover, we argue that BPS D-branes pulled across the IIA/IIB wall become non-BPS D-branes, which we identify with fluxbrane configurations. We show that the non-BPS D-branes of either type II theory are charged under a <math display=\"inline\"><msub><mi mathvariant=\"double-struck\">Z</mi><mn>2</mn></msub></math> remnant of the Ramond-Ramond potentials of the other, which we identify with the mod 2 reduction of the Ramond-Ramond fluxes. Similar considerations provide a complementary perspective on the heterotic <math display=\"inline\"><mi mathvariant=\"fraktur\">so</mi><mo stretchy=\"false\">(</mo><mn>32</mn><mo stretchy=\"false\">)</mo></math> S-duals of known non-BPS 7- and 8-branes in type I string theory."
  number_of_pages: 51
- title: Nonlinear gravitational memory in the post-Minkowskian expansion
  arxivnumber: "2506.20733"
  arxiv_categories: [hep-th, gr-qc, hep-ph]
  doi: "10.1103/8m17-s2y8"
  journal: "Phys.Rev.Lett."
  journal_volume: "136"
  journal_artid: "121401"
  publication_year: 2026
  authors:
    - "Georgoudis, Alessandro"
    - "Goncalves, Vasco"
    - "Heissenberg, Carlo"
    - "Parra-Martinez, Julio"
  preprint_date: "2025-06-25"
  texkey: "Georgoudis:2025vkk"
  abstract: "We present the first computation of the nonlinear gravitational memory waveform for the scattering of two compact objects in general relativity at leading order in the post-Minkowskian expansion. We use the scattering-amplitude-based representation of the gravitational waveform, which naturally expresses the nonlinear memory as the contribution of soft gravitons emitted by the gravitational waves themselves. We perform the calculation by applying a multipolar decomposition to the waveform and using the reverse unitarity method to obtain explicit exact-in-velocity predictions. We validate the results by calculating the corresponding velocity-expanded post-Newtonian multipoles, finding perfect agreement. Our results complete the knowledge of the gauge-invariant nonanalytic-in-frequency part of the <math display=\"inline\"><mi mathvariant=\"script\">O</mi><mo stretchy=\"false\">(</mo><msup><mi>G</mi><mn>3</mn></msup><mo stretchy=\"false\">)</mo></math> multipolar waveform, thus providing a useful benchmark for future calculations of this quantity."
  number_of_pages: 5
- title: Soft theorems from higher symmetries
  arxivnumber: "2505.03566"
  arxiv_categories: [hep-th]
  doi: "10.1007/JHEP03(2026)193"
  journal: "JHEP"
  journal_volume: "03"
  journal_artid: "193"
  publication_year: 2026
  authors:
    - "Berean-Dutcher, Jonah"
    - "Derda, Maria"
    - "Parra-Martinez, Julio"
  preprint_date: "2025-05-06"
  texkey: "Berean-Dutcher:2025ohp"
  abstract: We describe the connection between spontaneously-broken higher symmetries and soft theorems for scattering amplitudes of their associated Nambu-Goldstone bosons. Our main result is a new sub-leading double soft pion theorem in theories with a spontaneously-broken continuous 2-group global symmetry, which intertwines amplitudes with different numbers of pions and photons. We also provide a novel derivation of the leading soft photon theorem from the Ward identity of an emergent 1-form global symmetry in effective field theories where antiparticles are integrated out. Our derivations of these soft theorems use the algebra of spacetime currents and do not rely on asymptotic symmetries or diagrammatic arguments.
  number_of_pages: 31
- title: Resummation of universal tails in gravitational waveforms
  arxivnumber: "2504.07862"
  arxiv_categories: [hep-th, astro-ph.HE, gr-qc, hep-ph]
  doi: "10.1103/jzd1-qzkt"
  journal: "Phys.Rev.Lett."
  journal_volume: "135"
  journal_artid: "141401"
  publication_year: 2025
  authors:
    - "Ivanov, Mikhail M."
    - "Li, Yue-Zhou"
    - "Parra-Martinez, Julio"
    - "Zhou, Zihan"
  preprint_date: "2025-04-10"
  texkey: "Ivanov:2025ozg"
  abstract: We present a formula for the universal anomalous scaling of the multipole moments of a generic gravitating source in classical general relativity. We derive this formula in two independent ways using effective field theory methods. First, we use the absorption of low-frequency gravitational waves by a black hole to identify the total multipole scaling dimension as the renormalized angular momentum of black hole perturbation theory. More generally, we show that the anomalous dimension is determined by phase shifts of gravitational waves elastically scattering off generic source multipole moments, which reproduces the renormalized angular momentum in the particular case of black holes. The effective field theory approach thus clarifies the role of the renormalized angular momentum in the multipole expansion. The universality of the point particle effective description of compact gravitating systems further allows us to extract the universal part of the anomalous dimension, which is the same for any object, including black holes, neutron stars, and binary systems. As an application, we propose a novel resummation of the universal short-distance logarithms (“tails”) in the gravitational waveform of binary systems, which may improve the modeling of signals from current and future gravitational wave experiments.
  number_of_pages: 14
- title: Graviton loops and negativity
  arxivnumber: "2501.17949"
  arxiv_categories: [hep-th]
  doi: "10.1007/JHEP08(2025)175"
  journal: "JHEP"
  journal_volume: "08"
  journal_artid: "175"
  publication_year: 2025
  authors:
    - "Chang, Cyuan-Han"
    - "Parra-Martinez, Julio"
  preprint_date: "2025-01-29"
  texkey: "Chang:2025cxc"
  abstract: We revisit dispersive bounds on Wilson coefficients of scalar effective field theories (EFT) coupled to gravity in various spacetime dimensions, by computing the contributions from graviton loops to the corresponding sum rules at low energies. Fixed-momentum-transfer dispersion relations are often ill-behaved due to forward singularities arising from loop-level graviton exchange, making naive positivity bounds derived from them unreliable. Instead, we perform a careful analysis using crossing-symmetric dispersion relations, and compute the one-loop corrections to the bounds on EFT coefficients. We find that including the graviton loops generically allows for negativity of Wilson coefficients by an amount suppressed by powers of Newton’s constant, G. The exception are the few couplings that dominate over (or are degenerate with) the graviton loops at low energies. In D = 4, we observe that assuming that the eikonal formula captures the correct forward behavior of the amplitude at all orders in G, and for energies of the order of the EFT cutoff, yields bounds free of logarithmic infrared divergences.
  number_of_pages: 56
- title: Classical observables from causal response functions
  arxivnumber: "2411.09016"
  arxiv_categories: [hep-th, gr-qc, hep-ph]
  doi: "10.1007/JHEP07(2025)037"
  journal: "JHEP"
  journal_volume: "07"
  journal_artid: "037"
  publication_year: 2025
  authors:
    - "Biswas, Shovon"
    - "Parra-Martinez, Julio"
  preprint_date: "2024-11-13"
  texkey: "Biswas:2024ept"
  abstract: "We revisit the calculation of classical observables from causal response functions, following up on recent work by Caron-Huot et al. [1]. We derive a formula to compute asymptotic in-in observables from a particular soft limit of five-point amputated response functions. Using such formula, we re-derive the formulas by Kosower, Maybee and O’Connell (KMOC) for the linear impulse and radiated linear momentum of particles undergoing scattering, and we present an unambiguous calculation of the radiated angular momentum at leading order. Then, we explore the consequences of manifestly causal Feynman rules in the calculation of classical observables by employing the causal (Keldysh) basis in the in-in formalism. We compute the linear impulse, radiated waveform and its variance at leading and/or next-to-leading order in the causal basis, and find that all terms singular in the ħ → 0 limit cancel manifestly at the integrand level. We also find that the calculations simplify considerably and classical properties such as factorization of six-point amplitudes are more transparent in the causal basis."
  number_of_pages: 31
- title: Gravitational scattering and beyond from extreme mass ratio effective field theory
  arxivnumber: "2406.14770"
  arxiv_categories: [hep-th, gr-qc, hep-ph]
  doi: "10.1007/JHEP10(2024)005"
  journal: "JHEP"
  journal_volume: "10"
  journal_artid: "005"
  publication_year: 2024
  authors:
    - "Cheung, Clifford"
    - "Parra-Martinez, Julio"
    - "Rothstein, Ira Z."
    - "Shah, Nabha"
    - "Wilson-Gerow, Jordan"
  preprint_date: "2024-06-20"
  texkey: "Cheung:2024byb"
  abstract: We explore a recently proposed effective field theory describing electromagnetically or gravitationally interacting massive particles in an expansion about their mass ratio, also known as the self-force (SF) expansion. By integrating out the deviation of the heavy particle about its inertial trajectory, we obtain an effective action whose only degrees of freedom are the lighter particle together with the photon or graviton, all propagating in a Coulomb or Schwarzschild background. The 0SF dynamics are described by the usual background field method, which at 1SF is supplemented by a “recoil operator” that encodes the wobble of the heavy particle, and similarly computable corrections appearing at 2SF and higher. Our formalism exploits the fact that the analytic expressions for classical backgrounds and particle trajectories encode dynamical information to all orders in the couplings, and from them we extract multiloop integrands for perturbative scattering. As a check, we study the two-loop classical scattering of scalar particles in electromagnetism and gravity, verifying known results. We then present new calculations for the two-loop classical scattering of dyons, and of particles interacting with an additional scalar or vector field coupling directly to the lighter particle but only gravitationally to the heavier particle.
  number_of_pages: 77
- title: Soft scalars in effective field theory
  arxivnumber: "2403.12142"
  arxiv_categories: [hep-th, hep-ph]
  doi: "10.1007/JHEP06(2024)133"
  journal: "JHEP"
  journal_volume: "06"
  journal_artid: "133"
  publication_year: 2024
  authors:
    - "Derda, Maria"
    - "Helset, Andreas"
    - "Parra-Martinez, Julio"
  preprint_date: "2024-03-18"
  texkey: "Derda:2024jvo"
  abstract: We derive a soft theorem for a massless scalar in an effective field theory with generic field content using the geometry of field space. This result extends the geometric soft theorem for scalar effective field theories by allowing the massless scalar to couple to other scalars, fermions, and gauge bosons. The soft theorem keeps its geometric form, but where the field-space geometry now involves the full field content of the theory. As a bonus, we also present novel double soft theorems with fermions, which mimic the geometric structure of the double soft theorem for scalars.
  number_of_pages: 34
- title: "Gravitational Raman scattering in effective field theory: a scalar tidal matching at \\({\\cal O}(G^3)\\)"
  arxivnumber: "2401.08752"
  arxiv_categories: [hep-th, astro-ph.CO, astro-ph.HE, gr-qc, hep-ph]
  doi: "10.1103/PhysRevLett.132.131401"
  journal: "Phys.Rev.Lett."
  journal_volume: "132"
  journal_artid: "131401"
  publication_year: 2024
  authors:
    - "Ivanov, Mikhail M."
    - "Li, Yue-Zhou"
    - "Parra-Martinez, Julio"
    - "Zhou, Zihan"
  preprint_date: "2024-01-16"
  texkey: "Ivanov:2024sds"
  abstract: "We present a framework to compute amplitudes for the gravitational analog of the Raman process, a quasielastic scattering of waves off compact objects, in worldline effective field theory. As an example, we calculate third post-Minkowskian order [<math display=\"inline\"><mi mathvariant=\"script\">O</mi><mo stretchy=\"false\">(</mo><msup><mi>G</mi><mn>3</mn></msup><mo stretchy=\"false\">)</mo></math>], or two-loop, phase shifts for the scattering of a massless scalar field including all tidal effects and dissipation. Our calculation unveils two sources of the classical renormalization-group flow of dynamical Love numbers: a universal running independent of the nature of the compact object, and a running self-induced by tides. Restricting to the black hole case, we find that our effective field theory phase shifts agree exactly with those from general relativity, provided that the relevant static Love numbers are set to zero. In addition, we carry out a complete matching of the leading scalar dynamical Love number required to renormalize a universal short scale divergence in the <math display=\"inline\"><mi>S</mi></math> wave. Our results pave the way for systematic calculations of gravitational Raman scattering at higher post-Minkowskian orders."
  number_of_pages: 6
- title: Effective field theory for extreme mass ratios
  arxivnumber: "2308.14832"
  arxiv_categories: [hep-th, gr-qc, hep-ph]
  doi: "10.1103/PhysRevLett.132.091402"
  journal: "Phys.Rev.Lett."
  journal_volume: "132"
  journal_artid: "091402"
  publication_year: 2024
  authors:
    - "Cheung, Clifford"
    - "Parra-Martinez, Julio"
    - "Rothstein, Ira Z."
    - "Shah, Nabha"
    - "Wilson-Gerow, Jordan"
  preprint_date: "2023-08-28"
  texkey: "Cheung:2023lnj"
  abstract: We derive an effective field theory describing a pair of gravitationally interacting point particles in an expansion in their mass ratio, also known as the self-force (SF) expansion. The 0SF dynamics are trivially obtained to all orders in Newton’s constant by the geodesic motion of the light body in a Schwarzschild background encoding the gravitational field of the heavy body. The corrections at 1SF and higher are generated by perturbations about this configuration—that is, the geodesic deviation of the light body and the fluctuation graviton—but crucially supplemented by an operator describing the recoil of the heavy body as it interacts with the smaller companion. Using this formalism we compute new results at third post-Minkowskian order for the conservative dynamics of a system of gravitationally interacting massive particles coupled to a set of additional scalar and vector fields.
  number_of_pages: 9
- title: "Comparison of post-Minkowskian and self-force expansions: Scattering in a scalar charge toy model"
  arxivnumber: "2304.09200"
  arxiv_categories: [hep-th, gr-qc]
  doi: "10.1103/PhysRevD.108.024025"
  journal: "Phys.Rev.D"
  journal_volume: "108"
  journal_artid: "024025"
  publication_year: 2023
  authors:
    - "Barack, Leor"
    - "Bern, Zvi"
    - "Herrmann, Enrico"
    - "Long, Oliver"
