  abstract: "We complete the calculation of conservative two-body scattering dynamics at fourth post-Minkowskian order, i.e., <math display=\"inline\"><mi mathvariant=\"script\">O</mi><mo stretchy=\"false\">(</mo><msup><mi>G</mi><mn>4</mn></msup><mo stretchy=\"false\">)</mo></math> and all orders in velocity, including radiative contributions corresponding to the tail effect in general relativity. As in previous calculations, we harness powerful tools from the modern scattering amplitudes program including generalized unitarity, the double copy, and advanced multiloop integration methods, in combination with effective field theory. The classical amplitude involves complete elliptic integrals, and polylogarithms with up to transcendental weight 2. Using the amplitude-action relation, we obtain the radial action directly from the amplitude, and match the known overlapping terms in the post-Newtonian expansion."
