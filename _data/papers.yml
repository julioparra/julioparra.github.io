    - "Teng, Fei"
    - "Zeng, Mao"
  preprint_date: "2023-04-18"
  texkey: "Barack:2023oqp"
  abstract: "We compare numerical self-force results and analytical fourth-order post-Minkowskian (PM) calculations for hyperbolic-type scattering of a pointlike particle carrying a scalar charge <math display=\"inline\"><mi>Q</mi></math> off a Schwarzschild black hole, showing a remarkably good agreement. Specifically, we numerically compute the scattering angle including the full <math display=\"inline\"><mi mathvariant=\"script\">O</mi><mo stretchy=\"false\">(</mo><msup><mi>Q</mi><mn>2</mn></msup><mo stretchy=\"false\">)</mo></math> scalar-field self-force term (but ignoring the gravitational self-force), and we compare with analytical expressions obtained in a PM framework using scattering-amplitude methods. This example provides a nontrivial, high-precision test of both calculation methods and illustrates the complementarity of the two approaches in the context of the program to provide high-precision models of gravitational two-body dynamics. Our PM calculation is carried out through 4PM order, i.e., including all terms through <math display=\"inline\"><mi mathvariant=\"script\">O</mi><mo stretchy=\"false\">(</mo><msup><mi>Q</mi><mn>2</mn></msup><msup><mi>G</mi><mn>3</mn></msup><mo stretchy=\"false\">)</mo></math>. At the fourth post-Minkowskian order the point-particle description involves two a priori undetermined coefficients, due to contributions from tidal effects in the model under consideration. These coefficients are chosen to align the post-Minkowskian results with the self-force ones."
  number_of_pages: 53
- title: Soft phonon theorems
  arxivnumber: "2301.11363"
  arxiv_categories: [hep-th, cond-mat.other, hep-ph]
  doi: "10.1007/JHEP08(2023)103"
  journal: "JHEP"
  journal_volume: "08"
  journal_artid: "103"
  publication_year: 2023
  authors:
    - "Cheung, Clifford"
    - "Derda, Maria"
    - "Helset, Andreas"
    - "Parra-Martinez, Julio"
  preprint_date: "2023-01-26"
  texkey: "Cheung:2023qwn"
  abstract: A variety of condensed matter systems describe gapless modes that can be interpreted as Nambu-Goldstone bosons of spontaneously broken Poincaré symmetry. In this paper we derive new soft theorems constraining the tree-level scattering of these degrees of freedom, as exhibited in solids, fluids, superfluids, and framids. These soft theorems are in one-to-one correspondence with various broken symmetries, including spacetime translations, Lorentz boosts, and, for the case of fluids, volume-preserving diffeomorphisms. We also implement a bootstrap in which the enhanced vanishing of amplitudes in the soft limit is taken as an input, thus sculpting out a subclass of exceptional solid, fluid, and framid theories.
  number_of_pages: 40
- title: Graviton partial waves and causality in higher dimensions
  arxivnumber: "2205.01495"
  arxiv_categories: [hep-th, gr-qc]
  doi: "10.1103/PhysRevD.108.026007"
  journal: "Phys.Rev.D"
  journal_volume: "108"
  journal_artid: "026007"
  publication_year: 2023
  authors:
    - "Caron-Huot, Simon"
    - "Li, Yue-Zhou"
    - "Parra-Martinez, Julio"
    - "Simmons-Duffin, David"
  preprint_date: "2022-05-03"
  texkey: "Caron-Huot:2022jli"
  abstract: "Do gravitational interactions respect the basic principles of relativity and quantum mechanics? We show that any graviton <math display=\"inline\"><mi>S</mi></math>-matrix that satisfies these assumptions cannot significantly differ from General Relativity at low energies. We provide sharp bounds on the size of potential corrections in terms of the mass <math display=\"inline\"><mi>M</mi></math> of new higher-spin states, in spacetime dimensions <math display=\"inline\"><mi>D</mi><mo>≥</mo><mn>5</mn></math> where the <math display=\"inline\"><mi>S</mi></math>-matrix does not suffer from infrared ambiguities. The key novel ingredient is the full set of <math display=\"inline\"><mrow><mi>SO</mi><mo stretchy=\"false\">(</mo><mi>D</mi><mo>-</mo><mn>1</mn><mo stretchy=\"false\">)</mo></mrow></math> partial waves for this process, which we show how to efficiently compute with Young tableau manipulations. We record new bounds on the central charges of holographic conformal theories."
  number_of_pages: 17
- title: Non-perturbative double copy in Flatland
  arxivnumber: "2204.07130"
  arxiv_categories: [hep-th, hep-ph]
  doi: "10.1103/PhysRevLett.129.221602"
  journal: "Phys.Rev.Lett."
  journal_volume: "129"
  journal_artid: "221602"
  publication_year: 2022
  authors:
    - "Cheung, Clifford"
    - "Mangan, James"
    - "Parra-Martinez, Julio"
    - "Shah, Nabha"
  preprint_date: "2022-04-14"
  texkey: "Cheung:2022mix"
  abstract: We derive a non-perturbative, Lagrangian-level formulation of the double copy in two spacetime dimensions. Our results elucidate the field theoretic underpinnings of the double copy in a broad class of scalar theories which can include masses and higher-dimension operators. An immediate corollary is the amplitudes-level double copy at all orders in perturbation theory. Applied to certain integrable models, the double copy defines an isomorphism between Lax connections, Wilson lines, and infinite towers of conserved currents. We also implement the double copy at the level of non-perturbative classical solutions, both analytically and numerically, and present a generalization of the double copy map that includes a fixed tower of higher-dimension corrections given by the Moyal algebra.
  number_of_pages: 9
- title: Geometry-kinematics duality
  arxivnumber: "2202.06972"
  arxiv_categories: [hep-th, hep-ph]
  doi: "10.1103/PhysRevD.106.045016"
  journal: "Phys.Rev.D"
  journal_volume: "106"
  journal_artid: "045016"
  publication_year: 2022
  authors:
    - "Cheung, Clifford"
    - "Helset, Andreas"
    - "Parra-Martinez, Julio"
  preprint_date: "2022-02-14"
  texkey: "Cheung:2022vnd"
  abstract: We propose a mapping between geometry and kinematics that implies the classical equivalence of any theory of massless bosons—including spin and exhibiting arbitrary derivative or potential interactions—to a nonlinear sigma model (NLSM) with a momentum-dependent metric in field space. From this kinematic metric we construct a corresponding kinematic connection, covariant derivative, and curvature, all of which transform appropriately under general field redefinitions, even including derivatives. We show explicitly how all tree-level on-shell scattering amplitudes of massless bosons are equal to those of the NLSM via the replacement of geometry with kinematics. Lastly, we describe how the recently introduced geometric soft theorem of the NLSM, which universally encodes all leading and subleading soft scalar theorems, also captures the soft photon theorems.
  number_of_pages: 6
