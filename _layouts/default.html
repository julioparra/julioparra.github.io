<!DOCTYPE html>
<html>

  {% include head.html %}

  <body>

    {% include header.html %}

    <div class="page-content">
      <div class="wrapper">
        {{ content }}
      </div>
    </div>

    {% include footer.html %}

    <script>
    function toggleSection(id, link) {
      var el = document.getElementById(id);
      var recent = document.getElementById(id + '-recent');
      if (el.style.display === 'none') {
        el.style.display = (id === 'all-coauthors') ? 'inline' : 'block';
        link.textContent = 'only recent';
        if (recent) recent.style.textDecoration = 'line-through';
      } else {
        el.style.display = 'none';
        link.textContent = 'see all';
        if (recent) recent.style.textDecoration = 'none';
      }
      return false;
    }
    </script>

  </body>

</html>
